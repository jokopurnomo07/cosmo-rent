[phases.setup]
nixPkgs = [
    "php83",
    "php83Packages.composer",
    "php83Extensions.pdo",
    "php83Extensions.pdo_pgsql",
    "php83Extensions.mbstring",
    "php83Extensions.tokenizer",
    "php83Extensions.xml",
    "php83Extensions.ctype",
    "php83Extensions.curl",
    "php83Extensions.bcmath",
    "php83Extensions.fileinfo",
    "php83Extensions.openssl",
    "php83Extensions.gd",
    "php83Extensions.exif",
    "nodejs_20",
    "nodePackages.npm"
]

[phases.install]
cmds = [
    "composer install --no-dev --optimize-autoloader",
    "npm install"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "php artisan config:cache && php artisan route:cache && php artisan view:cache && php artisan migrate --force && php artisan serve --host=0.0.0.0 --port=$PORT"